<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tienda FourTech - Iniciar Sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
    <link rel="icon" href="img/logo.jpeg" type="image/png" />
  </head>

  <body class="login-page">
    <span class="ir-arriba icon-arrow-up2"
      ><i class="fa-solid fa-arrow-up"></i
    ></span>
    <header
      class="d-flex p-2 text-center py-4 justify-content-around align-items-center"
    >
      <div class="logo">
        <img src="img/logo.jpeg" alt="" />
      </div>
      <div class="slogan">
        <h1>Tienda Fourtech</h1>
        <p>Tenemos lo necesario para ti.</p>
      </div>

      <div class="d-flex gap-3 align-items-center">
        <div>
          <a href="/registro" class="btn btn-outline-success">Registrarse</a>
        </div>
      </div>
    </header>

    <nav
      class="navbar navbar-expand-lg bg-dark border-bottom border-body"
      data-bs-theme="dark"
    >
      <div class="container-fluid justify-content-end">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarTogglerDemo01"
          aria-controls="navbarTogglerDemo01"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-center text-center"
          id="navbarTogglerDemo01"
        >
          <ul class="navbar-nav mb-2 mb-lg-0 gap-5">
            <li class="nav-item">
              <a class="nav-link" href="/">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/computadoras">Computadoras</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/laptops">Laptops</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/accesorios">Accesorios</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="center-content">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-4">
            <div class="card shadow">
              <div class="card-header bg-dark text-white text-center">
                <h3>Iniciar Sesión</h3>
              </div>
              <div class="card-body">
                <div
                  th:if="${param.error}"
                  class="alert alert-danger"
                  role="alert"
                >
                  Email o contraseña incorrectos.
                </div>

                <div
                  th:if="${param.logout}"
                  class="alert alert-success"
                  role="alert"
                >
                  Has cerrado sesión correctamente.
                </div>

                <form th:action="@{/login}" method="post">
                  <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      name="email"
                      required
                    />
                  </div>

                  <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      name="password"
                      required
                    />
                  </div>

                  <div class="d-grid">
                    <button type="submit" class="btn btn-dark">
                      Iniciar Sesión
                    </button>
                  </div>
                </form>

                <div class="text-center mt-3">
                  <p>
                    ¿No tienes cuenta?
                    <a href="/registro" class="text-decoration-none"
                      >Regístrate aquí</a
                    >
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!--PARA EL FOOTER: Derechos Copy -->
    <footer class="bg-dark text-white text-center py-4">
      <h6>© 2025 Tienda FourTech. Todos los derechos reservados.</h6>
      <div class="redes">
        <div class="social"><i class="fa-brands fa-facebook"></i></div>
        <div class="social"><i class="fa-brands fa-instagram"></i></div>
        <div class="social"><i class="fa-brands fa-tiktok"></i></div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://kit.fontawesome.com/1da5200486.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Script para ir arriba -->
    <script>
      $(document).ready(function () {
        $(".ir-arriba").click(function () {
          $("body, html").animate(
            {
              scrollTop: "0px",
            },
            300
          );
        });
        $(window).scroll(function () {
          if ($(this).scrollTop() > 0) {
            $(".ir-arriba").slideDown(300);
          } else {
            $(".ir-arriba").slideUp(300);
          }
        });
      });
    </script>
  </body>
</html>
