<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tienda FourTech - Usuarios Registrados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/laptops.css" rel="stylesheet">
    <link rel="icon" href="img/logo.jpeg" type="image/png">
</head>

<body>
    <span class="ir-arriba icon-arrow-up2"><i class="fa-solid fa-arrow-up"></i></span>
    <header class="d-flex p-2 text-center py-4 justify-content-around align-items-center">
        <div class="logo">
            <img src="img/logo.jpeg" alt="" width="200px" height="200px" />
        </div>
        <div class="slogan">
            <h1>Tienda Fourtech</h1>
            <p>Tenemos lo necesario para ti.</p>
        </div>

        <nav class="navbar bg-body-tertiary d-none d-lg-block">
            <div class="container-fluid mb-3 row">
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Buscar en nuestro catálogo"
                        aria-label="Search" />
                    <button class="btn btn-dark" type="submit">Buscar</button>
                </form>
            </div>
        </nav>

    </header>

    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid justify-content-end">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo01"
                aria-controls="navbarTogglerDemo01" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center text-center" id="navbarTogglerDemo01">
                <ul class="navbar-nav mb-2 mb-lg-0 gap-5">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pcs">Computadoras</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/laptops">Laptops</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/accesorios">Accesorios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/registro">Regístrate</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/usuarios">Usuarios Registrados</a>
                    </li>
                </ul>
                <nav class="navbar bg-body-tertiary d-block d-lg-none">
                    <div class="container-fluid mb-3 row">
                        <form class="d-flex" role="search">
                            <input class="form-control me-2" type="search" placeholder="Buscar en nuestro catálogo"
                                aria-label="Search" />
                            <button class="btn btn-dark" type="submit">Buscar</button>
                        </form>
                    </div>
                </nav>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h2 class="text-center mb-4">Lista de Usuarios Registrados</h2>

        <div th:if="${#lists.isEmpty(usuarios)}" class="alert alert-info text-center" role="alert">
            No hay usuarios registrados en la base de datos.
        </div>

        <div th:unless="${#lists.isEmpty(usuarios)}">
            <table class="table table-striped table-hover table-responsive">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Dirección</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id_usuario}"></td>
                        <td th:text="${usuario.nombres}"></td>
                        <td th:text="${usuario.apellidos}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td th:text="${usuario.telefono}"></td>
                        <td th:text="${usuario.direccion}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/tu-kit-id.js" crossorigin="anonymous"></script>
</body>

</html>
