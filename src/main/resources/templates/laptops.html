<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tienda FourTech</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/laptops.css" rel="stylesheet" />
    <!-- Para agregar ícono del logo a la página -->
    <link rel="icon" href="img/logo.jpeg" type="image/png" />
  </head>
  <body>
    <span class="ir-arriba icon-arrow-up2"
      ><i class="fa-solid fa-arrow-up"></i
    ></span>
    <!--PARA DE LA CABECERA: LOGO Y MENSAJE -->
    <header
      class="d-flex p-2 text-center py-4 justify-content-around align-items-center"
    >
      <div class="logo">
        <img src="img/logo.jpeg" alt="" width="200px" height="200px" />
      </div>
      <div class="slogan">
        <h1>Tienda Fourtech</h1>
        <p>Tenemos lo necesario para ti.</p>
      </div>

      <nav class="navbar bg-body-tertiary d-none d-lg-block">
        <div class="container-fluid mb-3 row">
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Buscar en nuestro catálogo"
              aria-label="Search"
            />
            <button class="btn btn-dark" type="submit">Buscar</button>
          </form>
        </div>
      </nav>
    </header>

    <!--PARA EL MENÚ -->
    <nav
      class="navbar navbar-expand-lg bg-dark border-bottom border-body"
      data-bs-theme="dark"
    >
      <div class="container-fluid justify-content-end">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarTogglerDemo01"
          aria-controls="navbarTogglerDemo01"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-center text-center"
          id="navbarTogglerDemo01"
        >
          <ul class="navbar-nav mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" th:href="@{/}">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/computadoras}">Computadoras</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" aria-current="page" th:href="@{/laptops}"
                >Laptops</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/accesorios}">Accesorios</a>
            </li>
          </ul>
          <nav class="navbar bg-body-tertiary d-block d-lg-none">
            <div class="container-fluid mb-3 row">
              <form class="d-flex" role="search">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Buscar en nuestro catálogo"
                  aria-label="Search"
                />
                <button class="btn btn-dark" type="submit">Buscar</button>
              </form>
            </div>
          </nav>
        </div>
      </div>
    </nav>

    <!-- Sección de productos -->
    <main class="container-fluid mt-5">
      <article class="row text-center justify-content-center">
        <h2>INTEL</h2>
        <section th:each="productos : ${productos}" class="columna col-sm-10 col-md-5 col-lg-6 border p-3 m-2">
          <img
            class="img-fluid mx-auto"
            th:src="${productos.imagen}"
            alt=""
          />
          <p class="fw-bold" th:text="${productos.nombre}">
            
          </p>
          <p>S/<mark th:text="${productos.precio}"></mark></p>
          <button class="btn btn-secondary p-3 fw-bold">
            Añadir al carrito
          </button>
        </section>
        
      </article>
    </main>

    <!-- Modales de los productos -->
    <!-- Modal HP Pavilion 15 -->
    <div
      class="modal fade"
      id="modalHP"
      tabindex="-1"
      aria-labelledby="modalHPLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalHPLabel">HP Pavilion 15</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body">
            <img
              src="https://via.placeholder.com/200x140?text=HP"
              class="img-fluid"
              alt="HP Pavilion 15"
            />
            <p>
              <strong>Características:</strong> Intel Core i5 | 8GB RAM | 512GB
              SSD | 15.6”
            </p>
            <p><strong>Precio:</strong> S/ 2,799.00</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
            <button type="button" class="btn btn-primary">Comprar Ahora</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
      <p>&copy; 2025 Tienda FourTech. Todos los derechos reservados.</p>
      <p>
        <a href="https://www.facebook.com" class="text-white">Facebook</a> |
        <a href="https://www.instagram.com" class="text-white">Instagram</a> |
        <a href="https://www.twitter.com" class="text-white">X</a>
      </p>
    </footer>

    <!-- Scripts necesarios para Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <!-- Para algunas funciones -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- Íconos -->
    <script
      src="https://kit.fontawesome.com/1da5200486.js"
      crossorigin="anonymous"
    ></script>

    <!-- Script para ir arriba -->
    <script>
      $(document).ready(function () {
        $(".ir-arriba").click(function () {
          $("body, html").animate(
            {
              scrollTop: "0px",
            },
            300
          );
        });
        $(window).scroll(function () {
          if ($(this).scrollTop() > 0) {
            $(".ir-arriba").slideDown(300);
          } else {
            $(".ir-arriba").slideUp(300);
          }
        });
      });
    </script>
  </body>
</html>
